  <script>
    let fileData = null;
    let fileName = null;
    let fileMimeType = null;

    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      document.getElementById('fileNameDisplay').innerText = file.name;

      const reader = new FileReader();
      reader.onload = function (e) {
        fileData = e.target.result;
        fileName = file.name;
        fileMimeType = file.type;
      };
      reader.readAsDataURL(file);
    }

    function submitForm(e) {
      e.preventDefault();

      document.getElementById('submitBtn').disabled = true;
      document.getElementById('loadingMsg').style.display = 'block';

      const data = {
        email: document.getElementById('email').value,
        staffName: document.getElementById('staffName').value,
        location: document.getElementById('location').value,
        altLocation: document.getElementById('altLocation').value,
        type: document.querySelector('input[name="type"]:checked').value,
        priority: document.querySelector('input[name="priority"]:checked').value,
        details: document.getElementById('details').value,
        fileData: fileData,
        fileName: fileName,
        fileMimeType: fileMimeType
      };

      google.script.run
        .withSuccessHandler(function (res) {
          if (res.success) {
            Swal.fire({
              title: 'Success!',
              html: `Your maintenance request has been submitted successfully.<br><br>Request ID: <b>${res.submissionId}</b>`,
              icon: 'success',
              confirmButtonText: 'Submit Another Report',
              confirmButtonColor: '#3b82f6',
              allowOutsideClick: false
            }).then(() => {
              document.getElementById('maintenanceForm').reset();
              if (window.tomSelectInstance) {
                window.tomSelectInstance.clear();
              }
              document.getElementById('fileNameDisplay').textContent = '';
              fileData = null;
              fileName = null;
              fileMimeType = null;
              resetBtn();
            });
          } else {
            Swal.fire('Error', res.error, 'error');
            resetBtn();
          }
        })
        .withFailureHandler(function (err) {
          Swal.fire('Submission Failed', err.toString(), 'error');
          resetBtn();
        })
        .processForm(data);
    }

    function resetBtn() {
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('loadingMsg').style.display = 'none';
    }

    // Initialize Tom Select for searchable location dropdown
    window.addEventListener('DOMContentLoaded', () => {
      window.tomSelectInstance = new TomSelect("#location", {
        create: false,
        sortField: {
          field: "text",
          direction: "asc"
        },
        placeholder: "Select or type to search..."
      });
    });
  </script>
